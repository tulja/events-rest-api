# Build and test the Go API (requires Go >= 1.26 for gin/vault/slog deps)
name: Go

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Print Go version
        run: go version

      - name: Build
        run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Print Go version
        run: go version

      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test ./... -count=1
        # modernc.org/sqlite is pure Go (no CGO)
